<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ordine Confermato — MANBAGA Comics &amp; Games</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="fonts/fonts.css">
    <link rel="icon" type="image/png" href="WhatsApp_Image_2026-03-10_at_11.15.27-removebg-preview.png">
    <style>
        .success-page {
            max-width: 640px;
            margin: 110px auto 80px;
            padding: 0 24px;
        }

        .success-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .success-check {
            width: 72px; height: 72px;
            background: #16a34a;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px;
        }
        .success-check svg { width: 36px; height: 36px; }
        .success-header h1 {
            font-family: 'Bangers', sans-serif;
            font-size: 2.6rem;
            letter-spacing: .08em;
            color: var(--white);
            margin: 0 0 8px;
        }
        .success-header p {
            font-size: 14px;
            color: rgba(245,240,232,.5);
            line-height: 1.6;
            margin: 0;
        }

        .order-card {
            background: #161616;
            border: 1px solid rgba(245,240,232,.1);
            margin-bottom: 16px;
        }
        .order-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid rgba(245,240,232,.07);
        }
        .order-card-header .label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: .1em;
            color: rgba(245,240,232,.4);
        }
        .order-number {
            font-family: 'Bangers', sans-serif;
            font-size: 1.5rem;
            letter-spacing: .1em;
            color: var(--red);
        }
        .order-date {
            font-size: 13px;
            color: rgba(245,240,232,.5);
        }

        .order-items { padding: 8px 0; }
        .order-item {
            display: grid;
            grid-template-columns: 52px 1fr auto;
            align-items: center;
            gap: 14px;
            padding: 12px 20px;
            border-bottom: 1px solid rgba(245,240,232,.05);
        }
        .order-item:last-child { border-bottom: none; }
        .order-item img {
            width: 52px; height: 66px;
            object-fit: cover; display: block;
        }
        .order-item-info { min-width: 0; }
        .order-item-title {
            font-weight: 700; font-size: 14px;
            color: var(--white);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            margin-bottom: 3px;
        }
        .order-item-qty {
            font-size: 12px;
            color: rgba(245,240,232,.4);
        }
        .order-item-price {
            font-family: 'Bangers', sans-serif;
            font-size: 1.1rem;
            letter-spacing: .04em;
            color: var(--red);
            white-space: nowrap;
        }

        .order-total-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-top: 1px solid rgba(245,240,232,.1);
        }
        .order-total-row .label {
            font-size: 13px;
            font-weight: 700;
            color: var(--white);
        }
        .order-total-amount {
            font-family: 'Bangers', sans-serif;
            font-size: 1.6rem;
            letter-spacing: .06em;
            color: var(--red);
        }

        .success-note {
            font-size: 13px;
            color: rgba(245,240,232,.4);
            text-align: center;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .success-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        .success-actions a {
            display: inline-block;
            padding: 12px 28px;
            text-decoration: none;
            font-family: 'Bangers', sans-serif;
            font-size: 1rem;
            letter-spacing: .08em;
            transition: background .15s;
        }
        .btn-primary {
            background: var(--red);
            color: #fff;
        }
        .btn-primary:hover { background: #b91c1c; }
        .btn-secondary {
            background: transparent;
            color: var(--white);
            border: 1px solid rgba(245,240,232,.2);
        }
        .btn-secondary:hover { border-color: rgba(245,240,232,.5); }

        @media (max-width: 480px) {
            .order-card-header { flex-direction: column; align-items: flex-start; gap: 8px; }
            .success-actions { flex-direction: column; }
            .success-actions a { text-align: center; }
        }
    </style>
</head>
<body>
<nav id="nav">
    <div class="nav-inner">
        <a class="nav-logo" href="index.html">MANBAGA</a>
    </div>
</nav>

<div class="success-page">
    <div class="success-header">
        <div class="success-check">
            <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"/>
            </svg>
        </div>
        <h1>Ordine Confermato!</h1>
        <p>Il pagamento è andato a buon fine.<br>Riceverai una email di conferma a breve.</p>
    </div>

    <div class="order-card" id="order-card">
        <div class="order-card-header">
            <div>
                <div class="label">Numero ordine</div>
                <div class="order-number" id="order-number">#—</div>
            </div>
            <div class="order-date" id="order-date"></div>
        </div>
        <div class="order-items" id="order-items"></div>
        <div class="order-total-row" id="order-total" style="display:none">
            <span class="label">Totale pagato</span>
            <span class="order-total-amount" id="order-total-amount"></span>
        </div>
    </div>

    <p class="success-note">
        Passa in negozio con il numero d'ordine per ritirare i tuoi prodotti.<br>
        Per assistenza: <a href="mailto:manbagacomics@gmail.com" style="color:rgba(245,240,232,.7)">manbagacomics@gmail.com</a>
    </p>

    <div class="success-actions">
        <a href="catalogo.html" class="btn-primary">Continua lo Shopping</a>
        <a href="index.html" class="btn-secondary">Torna alla Home</a>
    </div>
</div>

<script>
(function () {
    var params    = new URLSearchParams(window.location.search);
    var sessionId = params.get('session_id');

    if (sessionId) {
        var shortId = sessionId.slice(-8).toUpperCase();
        document.getElementById('order-number').textContent = '#' + shortId;
    }

    try {
        var raw = localStorage.getItem('mb_last_order');
        if (!raw) return;
        var order = JSON.parse(raw);

        if (order.date) document.getElementById('order-date').textContent = order.date;

        if (Array.isArray(order.items) && order.items.length) {
            var esc = function(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); };
            var html = order.items.map(function(item) {
                var sub = (parseFloat(String(item.price).replace(/[^0-9.,]/g,'').replace(',','.')) * item.qty).toFixed(2);
                return '<div class="order-item">'
                    + '<img src="' + esc(item.image || '') + '" alt="' + esc(item.title) + '">'
                    + '<div class="order-item-info">'
                    + '<div class="order-item-title">' + esc(item.title) + '</div>'
                    + '<div class="order-item-qty">Quantità: ' + parseInt(item.qty) + '</div>'
                    + '</div>'
                    + '<div class="order-item-price">&euro;' + sub + '</div>'
                    + '</div>';
            }).join('');
            document.getElementById('order-items').innerHTML = html;
        }

        if (order.total) {
            var totalEl = document.getElementById('order-total');
            totalEl.style.display = 'flex';
            document.getElementById('order-total-amount').textContent = '€' + order.total;
        }

        /* Aggiorna loyalty */
        try {
            var loyalty = JSON.parse(localStorage.getItem('mb_loyalty') || '{}');
            loyalty.totalSpent   = (Number(loyalty.totalSpent)   || 0) + parseFloat(order.total  || 0);
            loyalty.ordersPlaced = (Number(loyalty.ordersPlaced) || 0) + 1;
            localStorage.setItem('mb_loyalty', JSON.stringify(loyalty));
        } catch (e) {}

        /* Pulisce dopo la visualizzazione */
        localStorage.removeItem('mb_last_order');
    } catch(e) {}
})();
</script>
</body>
</html>
