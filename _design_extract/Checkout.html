<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Manbaga — Carrello</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Bowlby+One&family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#f5f3ef;
  --ink:#0c0c0c;
  --ink-2:#1a1a1a;
  --paper:#ffffff;
  --paper-2:#f7f5f1;
  --rule:#0c0c0c;
  --red:#e1251b;
  --red-deep:#b51810;
  --muted:#6b6b6b;
  --green:#138a5f;
  --shadow: 5px 5px 0 #0c0c0c;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:'Space Grotesk','Inter',system-ui,sans-serif}
body{
  background-color:var(--bg);
  background-image:
    radial-gradient(circle at 1px 1px, rgba(0,0,0,.08) 1px, transparent 1.4px);
  background-size: 14px 14px;
  background-position: 0 0;
}

/* ============ NAV ============ */
.nav{
  background:#0c0c0c;
  border-bottom:4px solid var(--red);
  color:#fff;
  position:relative;
}
.nav-inner{
  max-width:1320px;margin:0 auto;
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 32px;
}
.brand{
  font-family:'Bowlby One',sans-serif;
  letter-spacing:.04em;font-size:28px;
  color:#fff;text-decoration:none;
  display:inline-flex;align-items:center;gap:10px;
}
.brand .dot{width:10px;height:10px;background:var(--red);border-radius:50%;display:inline-block;box-shadow:0 0 0 3px #fff inset}
.nav-links{display:flex;gap:36px;align-items:center;font-weight:600;font-size:14px;letter-spacing:.14em}
.nav-links a{color:#fff;text-decoration:none;opacity:.85}
.nav-links a:hover{opacity:1;color:var(--red)}
.cart-btn{
  position:relative;width:42px;height:42px;border-radius:50%;
  background:#fff;color:#0c0c0c;display:grid;place-items:center;text-decoration:none
}
.cart-badge{
  position:absolute;top:-6px;right:-6px;background:var(--red);color:#fff;
  font-size:11px;font-weight:800;width:20px;height:20px;border-radius:50%;display:grid;place-items:center;
  border:2px solid #fff
}

/* ============ BREADCRUMB / TITLE BAR ============ */
.crumb{
  max-width:1240px;margin:0 auto;padding:24px 32px 0;
  display:flex;align-items:center;justify-content:space-between;
}
.crumb-steps{display:flex;gap:0;align-items:center;font-family:'Bowlby One';font-size:13px;letter-spacing:.08em}
.step{
  display:flex;align-items:center;gap:10px;
  padding:8px 14px;
  background:#fff;border:2px solid #111;
  box-shadow:3px 3px 0 #111;
  position:relative;
}
.step + .step{margin-left:14px}
.step .num{
  width:22px;height:22px;border-radius:50%;background:#111;color:#fff;
  display:grid;place-items:center;font-size:12px
}
.step.active{background:var(--red);color:#fff}
.step.active .num{background:#fff;color:var(--red)}
.step.done{background:#0c0c0c;color:#fff}
.step.done .num{background:#fff;color:#0c0c0c}
.crumb h1{
  font-family:'Bowlby One',sans-serif;
  font-size:28px;margin:0;letter-spacing:.02em;
  text-transform:uppercase;
}
.crumb h1 em{color:var(--red);font-style:normal}

/* ============ LAYOUT ============ */
.page{
  max-width:1240px;margin:0 auto;
  padding:22px 32px 80px;
  display:grid;
  grid-template-columns: minmax(0,1.6fr) minmax(0,1fr);
  gap:32px;
  align-items:flex-start;
}

/* ============ PANEL (manga card) ============ */
.panel{
  background:var(--paper);
  border:3px solid #111;
  box-shadow: var(--shadow);
  position:relative;
}
.panel-head{
  display:flex;align-items:center;gap:12px;
  padding:14px 18px;
  border-bottom:3px solid #0c0c0c;
  background:#0c0c0c;color:#fff;
  font-family:'Bowlby One',sans-serif;
  letter-spacing:.06em;
  text-transform:uppercase;
  position:relative;
  background-image:
    radial-gradient(circle at 1px 1px, rgba(255,255,255,.10) 1px, transparent 1.4px);
  background-size: 8px 8px;
}
.panel-head .tag{
  background:#fff;color:#0c0c0c;padding:2px 8px;font-size:11px;border:2px solid #fff
}
.panel-head .grow{flex:1}
.panel-head .cnt{
  background:var(--red);color:#fff;padding:2px 10px;font-size:13px;border:2px solid #fff;
  position:relative;z-index:1;
}

/* halftone corner */
.halftone{
  position:absolute;width:120px;height:120px;
  background-image: radial-gradient(circle, #111 1.6px, transparent 1.8px);
  background-size: 10px 10px;
  opacity:.22;pointer-events:none;
}
.ht-tl{top:-6px;left:-6px;mask-image:linear-gradient(135deg,#000,transparent 70%)}
.ht-br{bottom:-6px;right:-6px;mask-image:linear-gradient(315deg,#000,transparent 70%)}

/* ============ PRODUCT LIST ============ */
.product{
  display:grid;
  grid-template-columns: 100px 1fr auto auto;
  align-items:center;gap:18px;
  padding:16px;
  border-bottom:2px dashed #0c0c0c;
  position:relative;
}
.product:last-child{border-bottom:none}
.cover{
  width:96px;height:136px;
  border:3px solid #0c0c0c;
  box-shadow:3px 3px 0 #0c0c0c;
  background:#222;
  position:relative;overflow:hidden;
}
.cover image-slot{display:block;width:100%;height:100%}
.cover .label{
  position:absolute;left:0;bottom:0;background:#111;color:#fff;
  font-family:'Bowlby One';font-size:10px;letter-spacing:.06em;
  padding:3px 6px;
}
.p-info{min-width:0}
.p-title{
  font-family:'Bowlby One',sans-serif;
  font-size:18px;line-height:1.15;margin:0 0 5px;
  text-transform:uppercase;letter-spacing:.01em;
}
.p-meta{font-size:12.5px;color:var(--muted);margin:0 0 10px}
.p-tags{display:flex;gap:6px;flex-wrap:wrap}
.p-tag{
  font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  background:#fff;border:2px solid #111;padding:3px 8px;
}
.p-tag.red{background:var(--red);color:#fff;border-color:var(--red)}
.p-tag.dark{background:#0c0c0c;color:#fff;border-color:#0c0c0c}

.qty{
  display:inline-flex;align-items:center;
  border:2px solid #111;background:#fff;
  box-shadow:3px 3px 0 #111;
}
.qty button{
  width:34px;height:34px;border:none;background:transparent;
  font-size:18px;font-weight:800;cursor:pointer;font-family:'Bowlby One';
}
.qty button:hover{background:#111;color:#fff}
.qty .v{
  min-width:36px;text-align:center;font-weight:700;font-size:15px;
  border-left:2px solid #111;border-right:2px solid #111;
  height:34px;line-height:34px;
}
.price{
  font-family:'Bowlby One',sans-serif;
  font-size:20px;color:var(--red);
  text-align:right;min-width:80px;
}
.price small{display:block;font-size:11px;color:var(--muted);font-family:'Space Grotesk';font-weight:500;text-decoration:line-through;margin-top:2px}
.kill{
  position:absolute;top:8px;right:8px;
  width:26px;height:26px;border-radius:50%;
  background:#fff;border:2px solid #111;display:grid;place-items:center;
  cursor:pointer;font-weight:800;
}
.kill:hover{background:var(--red);color:#fff}

/* recommended row */
.also{
  margin-top:24px;
}
.also-head{
  display:flex;align-items:end;justify-content:space-between;margin-bottom:14px;
}
.also-head h3{
  font-family:'Bowlby One',sans-serif;text-transform:uppercase;
  font-size:20px;margin:0;letter-spacing:.02em;
}
.also-head .swish{color:var(--red)}
.also-grid{
  display:grid;grid-template-columns:repeat(4,1fr);gap:12px;
}
.mini{
  background:var(--paper);
  border:3px solid #111;
  box-shadow:4px 4px 0 #111;
  padding:10px;
  display:flex;flex-direction:column;gap:8px;
  cursor:pointer;transition:transform .15s;
}
.mini:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 #111}
.mini .m-cover{
  aspect-ratio: 3/4;border:2px solid #111;
  position:relative;overflow:hidden;
}
.mini .m-cover image-slot{display:block;width:100%;height:100%}
.mini .m-cover .ribbon{
  position:absolute;top:8px;left:-2px;background:var(--red);color:#fff;
  font-family:'Bowlby One';font-size:10px;padding:2px 8px;letter-spacing:.06em;
}
.mini h4{font-family:'Bowlby One';margin:0;font-size:13px;line-height:1.15;text-transform:uppercase}
.mini .m-row{display:flex;align-items:center;justify-content:space-between}
.mini .m-price{color:var(--red);font-family:'Bowlby One';font-size:15px}
.mini .add{
  background:#111;color:#fff;border:none;width:28px;height:28px;cursor:pointer;
  font-family:'Bowlby One';font-size:16px;display:grid;place-items:center;
}
.mini .add:hover{background:var(--red)}

/* ============ SIDEBAR ============ */
.side{position:relative}
.summary{position:relative}

.row{display:flex;justify-content:space-between;align-items:baseline;padding:10px 0;font-size:14px}
.row.muted{color:var(--muted)}
.row strong{font-weight:700}
.sum-body{padding:18px;background:#fff}
.sum-body hr{border:none;border-top:2px dashed #e1251b;margin:12px 0;opacity:.5}

.ship-bar{
  margin:10px 0 2px;background:#0c0c0c;color:#fff;border:2px solid #0c0c0c;padding:10px 12px;
  display:flex;flex-direction:column;gap:8px;
}
.ship-bar .top{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;letter-spacing:.02em}
.ship-bar .truck{
  width:22px;height:14px;background:var(--red);border:2px solid #fff;
  position:relative;flex-shrink:0;
}
.ship-bar .bar{
  height:8px;background:#222;
  border:2px solid #fff;position:relative;overflow:hidden;
}
.ship-bar .fill{
  position:absolute;inset:0;background:var(--red);
  transition: width .4s ease;
}

.total-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 18px;background:var(--red);color:#fff;
  border-top:3px solid #0c0c0c;border-bottom:3px solid #0c0c0c;
  position:relative;
  background-image:
    repeating-linear-gradient(135deg, transparent 0 12px, rgba(0,0,0,.08) 12px 14px);
}
.total-row::before{
  content:"";position:absolute;left:-3px;top:-3px;bottom:-3px;width:6px;background:#0c0c0c;
}
.total-row .lab{font-family:'Bowlby One';font-size:16px;letter-spacing:.06em}
.total-row .lab small{display:block;font-size:10px;opacity:.8;font-weight:400;letter-spacing:.08em;margin-top:2px}
.total-row .val{font-family:'Bowlby One';font-size:30px;color:#fff;text-shadow:2px 2px 0 #0c0c0c}
.total-row .val em{color:#fff;font-style:normal}

.promo{
  padding:16px 18px;background:#fff;
  border-bottom:3px solid #0c0c0c;
}
.promo label{font-family:'Bowlby One';font-size:12px;text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:8px}
.promo .promo-row{display:flex;gap:0}
.promo input{
  flex:1;background:#fff;border:2px solid #111;padding:10px 12px;font-size:14px;font-family:inherit;outline:none;
  border-right:none;
}
.promo input:focus{background:#fff7d6}
.promo .apply{
  background:#111;color:#fff;border:2px solid #111;padding:0 16px;
  font-family:'Bowlby One';letter-spacing:.06em;cursor:pointer;
}
.promo .apply:hover{background:var(--red);border-color:var(--red)}
.promo .chips{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.promo .chip{
  font-size:11px;font-weight:700;background:#fff;border:2px dashed #111;padding:3px 8px;cursor:pointer;letter-spacing:.04em;
}
.promo .chip:hover{background:var(--red);color:#fff;border-color:var(--red)}
.promo .applied{
  display:flex;align-items:center;gap:8px;background:#dff6ea;border:2px solid var(--green);
  padding:8px 10px;font-size:13px;font-weight:600;color:#0c5b3e;margin-top:10px;
}
.promo .applied .x{margin-left:auto;cursor:pointer;font-weight:800}

/* ============ CTA AREA (with mascot OUTSIDE) ============ */
.cta-zone{
  position:relative;
  padding:18px;
  background:var(--paper-2);
}

.terms{
  display:flex;gap:10px;align-items:flex-start;font-size:13px;line-height:1.4;margin-bottom:14px;
}
.terms input{
  appearance:none;width:20px;height:20px;border:2px solid #111;background:#fff;cursor:pointer;
  display:grid;place-items:center;flex-shrink:0;margin-top:1px;
}
.terms input:checked{background:var(--red)}
.terms input:checked::after{content:"✓";color:#fff;font-weight:800;font-size:14px;line-height:1}
.terms a{color:#111;font-weight:700;text-decoration:underline;text-decoration-thickness:2px;text-underline-offset:3px}
.terms a:hover{color:var(--red)}

.cta{
  display:flex;width:100%;padding:16px 18px;
  background:var(--red);color:#fff;border:3px solid #0c0c0c;
  font-family:'Bowlby One',sans-serif;font-size:17px;
  text-transform:uppercase;letter-spacing:.05em;
  cursor:pointer;box-shadow:5px 5px 0 #0c0c0c;
  align-items:center;justify-content:flex-start;gap:12px;
  transition: transform .12s, box-shadow .12s;
  position:relative;
  text-decoration:none;
}
.cta:hover{transform:translate(-2px,-2px);box-shadow:7px 7px 0 #111}
.cta:active{transform:translate(2px,2px);box-shadow:2px 2px 0 #111}
.cta[disabled]{background:#bbb;color:#fff;cursor:not-allowed;box-shadow:5px 5px 0 #555;border-color:#555}
.cta[disabled]:hover{transform:none;box-shadow:5px 5px 0 #555}
.cta .lock{
  width:24px;height:24px;background:#fff;color:var(--red);border-radius:50%;display:grid;place-items:center;font-size:13px;
}

.secure{
  display:flex;align-items:center;justify-content:center;gap:12px;
  margin-top:14px;font-size:12px;color:var(--muted);font-weight:500;
}
.secure .pills{display:flex;gap:6px}
.pill{
  background:#fff;border:2px solid #111;padding:3px 8px;font-family:'Bowlby One';font-size:10px;letter-spacing:.04em;
}

/* ============ MASCOT ============ */
/* unused — mascot removed */
.mascot, .bubble{display:none}
@keyframes bob{
  0%,100%{transform:rotate(-2deg) translateY(0)}
  50%{transform:rotate(1deg) translateY(-6px)}
}

/* speech bubble pointing at button */
.bubble{
  position:absolute;
  top:6px;right:-8px;
  background:#fff;border:3px solid #0c0c0c;
  padding:9px 12px;
  box-shadow:3px 3px 0 #0c0c0c;
  font-family:'Bowlby One';font-size:13px;letter-spacing:.04em;
  text-transform:uppercase;
  line-height:1;
  white-space:nowrap;
  transform:rotate(-4deg);
  z-index:4;
}
.bubble::after{
  content:"";position:absolute;
  right:14px;bottom:-16px;
  width:0;height:0;
  border-left:0 solid transparent;
  border-right:14px solid transparent;
  border-top:18px solid #0c0c0c;
}
.bubble::before{
  content:"";position:absolute;
  right:18px;bottom:-10px;
  width:0;height:0;
  border-right:9px solid transparent;
  border-top:12px solid #fff;
  z-index:1;
}
.bubble em{color:var(--red);font-style:normal}

/* arrow drawn from mascot toward CTA */
.point-arrow{
  position:absolute;
  right:-30px; bottom: 60px;
  width:90px;height:90px;
  pointer-events:none;
}

/* ============ TIER STRIP ============ */
.tier{
  display:grid;
  grid-template-columns: auto 1fr auto;
  gap:18px;
  align-items:stretch;
  padding:14px 16px;
  background:#0c0c0c;
  color:#fff;
  border:3px solid #0c0c0c;
  box-shadow: var(--shadow);
  margin-bottom:18px;
  position:relative;
  overflow:hidden;
}
.tier::before{
  content:"";position:absolute;inset:0;pointer-events:none;
  background-image: repeating-linear-gradient(45deg, transparent 0 18px, rgba(255,255,255,.04) 18px 19px);
}
.tier-silver{background:linear-gradient(90deg,#0c0c0c 60%, #1a1a1a)}
.tier-gold{background:linear-gradient(90deg,#0c0c0c 50%, #1c0908)}
.tier-gold::after{
  content:"";position:absolute;left:0;top:0;bottom:0;width:6px;background:var(--red);
}
.tier-silver::after{
  content:"";position:absolute;left:0;top:0;bottom:0;width:6px;background:#fff;
}
.tier-bronze::after{
  content:"";position:absolute;left:0;top:0;bottom:0;width:6px;background:#a86b3c;
}
.tier-medal{
  display:flex;align-items:center;justify-content:center;
  background:#fff;border:2px solid #fff;
  width:76px;height:76px;
  position:relative;z-index:1;
}
.tier-info{position:relative;z-index:1;display:flex;flex-direction:column;justify-content:center;gap:6px;min-width:0}
.tier-label{
  font-family:'Bowlby One';font-size:11px;letter-spacing:.14em;color:rgba(255,255,255,.6);text-transform:uppercase;
}
.tier-name{
  font-size:22px;color:#fff;margin-left:8px;letter-spacing:.04em;
}
.tier-gold .tier-name{color:var(--red);text-shadow:1px 1px 0 #fff}
.tier-perks{
  list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:3px;
  font-size:13px;font-weight:500;color:rgba(255,255,255,.92);
}
.tier-perks li{display:flex;align-items:center;gap:8px;line-height:1.25}
.tier-perks .dot{
  width:7px;height:7px;background:var(--red);display:inline-block;flex-shrink:0;
}

/* spend progress bar — no numbers, three stops */
.tier-bar-wrap{
  margin-top:10px;display:flex;flex-direction:column;gap:6px;
}
.tier-bar{
  position:relative;
  height:10px;
  background:rgba(255,255,255,.10);
  border:2px solid #fff;
}
.tier-bar-fill{
  position:absolute;top:0;left:0;bottom:0;
  background:var(--red);
  transition: width .5s cubic-bezier(.2,.8,.2,1);
}
.tier-stop{
  position:absolute;top:50%;transform:translate(-50%,-50%);
  z-index:1;
}
.tier-stop-b{left:0%}
.tier-stop-g{left:100%}
.tier-stop .stop-dot{
  display:grid;place-items:center;
  width:22px;height:22px;border-radius:50%;
  background:#0c0c0c;border:2px solid #fff;
  color:#fff;font-family:'Bowlby One';font-size:11px;
  letter-spacing:0;line-height:1;
}
.tier-stop.reached .stop-dot{background:var(--red);color:#fff;border-color:#fff}
.tier-stop-g.reached .stop-dot{background:#fff;color:var(--red)}
.tier-bar-cap{
  font-size:10.5px;font-weight:600;letter-spacing:.08em;color:rgba(255,255,255,.65);
  text-transform:uppercase;
}
.tier-bar-cap b{color:#fff}
.tier-status{
  position:relative;z-index:1;
  display:flex;flex-direction:column;align-items:flex-end;gap:8px;
  min-width:200px;text-align:right;
  border-left:2px dashed rgba(255,255,255,.18);
  padding-left:18px;
}
.tier-pct{
  font-family:'Bowlby One';font-size:34px;color:var(--red);line-height:.9;
  text-shadow: 2px 2px 0 #fff;
}
.tier-upsell{
  font-family:'Bowlby One';font-size:14px;line-height:1.1;color:#fff;
}
.tier-upsell b{color:var(--red);font-size:18px;display:block}
.tier-pct-lab{
  font-size:10.5px;font-weight:600;letter-spacing:.06em;color:rgba(255,255,255,.7);
  text-transform:uppercase;line-height:1.25;
}
.tier-progress{
  width:100%;display:flex;flex-direction:column;gap:6px;margin-top:4px;
}
.tier-prog-item{display:flex;flex-direction:column;gap:3px;text-align:left}
.tier-prog-top{
  display:flex;justify-content:space-between;align-items:baseline;
  font-size:10.5px;font-weight:600;letter-spacing:.04em;color:rgba(255,255,255,.85);
  text-transform:uppercase;
}
.tier-prog-top b{color:#fff;font-size:11px;font-family:'Bowlby One';letter-spacing:.06em}
.tier-prog-bar{
  height:6px;background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.3);
  position:relative;overflow:hidden;
}
.tier-prog-fill{
  position:absolute;inset:0;background:var(--red);
  transition: width .4s ease;
}

@media (max-width: 760px){
  .tier{grid-template-columns: auto 1fr;gap:12px}
  .tier-status{grid-column:1 / -1;align-items:flex-start;text-align:left;border-left:none;border-top:2px dashed rgba(255,255,255,.18);padding-left:0;padding-top:10px;min-width:0}
}

/* burst variants */
.burst-bronze{background:#a86b3c}
.burst-silver{background:#fff;color:#0c0c0c}
.burst-gold{background:#0c0c0c;color:var(--red)}
.burst-silver{box-shadow:0 0 0 3px #0c0c0c, 0 0 0 6px var(--red), 0 0 0 8px #0c0c0c}
.burst-gold{box-shadow:0 0 0 3px var(--red), 0 0 0 6px #fff, 0 0 0 8px #0c0c0c}

.trust{
  margin-top:20px;
  display:grid;grid-template-columns:repeat(3,1fr);gap:0;
  border:3px solid #111;background:var(--paper);
  box-shadow:var(--shadow);
}
.trust > div{
  padding:12px 12px;display:flex;align-items:center;gap:10px;font-size:12px;font-weight:600;line-height:1.2;
}
.trust > div + div{border-left:2px dashed #0c0c0c}
.trust .ico{
  width:34px;height:34px;background:#0c0c0c;color:#fff;border:2px solid #0c0c0c;display:grid;place-items:center;font-size:16px;flex-shrink:0;
}
.trust .ico.red{background:var(--red);color:#fff;border-color:var(--red)}
.trust .ico.white{background:#fff;color:#0c0c0c}

/* burst */
.burst{
  position:absolute;
  top:-26px;right:-22px;
  width:96px;height:96px;
  background:var(--red);
  display:grid;place-items:center;
  color:#fff;font-family:'Bowlby One';font-size:14px;line-height:1.1;text-align:center;letter-spacing:.04em;
  text-transform:uppercase;
  border-radius:50%;
  transform: rotate(-8deg);
  box-shadow:0 0 0 3px #0c0c0c, 0 0 0 6px #fff, 0 0 0 8px #0c0c0c;
  z-index:2;
  padding:6px;
}
.burst .small{font-size:9px;display:block;opacity:.9;letter-spacing:.06em;margin-top:2px}

/* sound effect */
.sfx{
  position:absolute;
  font-family:'Bangers',sans-serif;
  font-size:42px;
  color:var(--red);
  -webkit-text-stroke: 2px #0c0c0c;
  letter-spacing:.04em;
  pointer-events:none;
  transform: rotate(-12deg);
  text-shadow: 3px 3px 0 #0c0c0c;
  z-index:3;
}

@media (max-width: 1100px){
  .page{grid-template-columns:1fr;gap:24px}
  .mascot{left:auto;right:-10px;bottom:auto;top:-110px;width:140px;height:200px;transform:scaleX(-1)}
  .bubble{transform:scaleX(-1) rotate(-3deg)}
  .also-grid{grid-template-columns:repeat(2,1fr)}
}
@media (max-width: 640px){
  .nav-links{display:none}
  .product{grid-template-columns: 80px 1fr;gap:12px}
  .cover{width:80px;height:112px}
  .qty,.price{grid-column: 2}
  .price{text-align:left}
  .crumb{flex-direction:column;align-items:flex-start;gap:14px}
}
</style>
</head>
