<style>
/* ============================================================
   CARRELLO — manga design system
   ============================================================ */
:root{
  --cb:#f5f3ef;
  --cink:#0c0c0c;
  --cpaper:#ffffff;
  --cpaper2:#f7f5f1;
  --cred:#e1251b;
  --cred2:#b51810;
  --cmuted:#6b6b6b;
  --cgreen:#138a5f;
  --cshadow:5px 5px 0 #0c0c0c;
}
body.page-carrello{
  background-color:var(--cb);
  background-image:radial-gradient(circle at 1px 1px,rgba(0,0,0,.08) 1px,transparent 1.4px);
  background-size:14px 14px;
  font-family:'Space Grotesk','Inter',system-ui,sans-serif;
}

/* ============ BREADCRUMB ============ */
.c-crumb{
  display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:14px;
  margin-bottom:22px;
}
.c-title{
  font-family:'Bowlby One',sans-serif;
  font-size:clamp(22px,4vw,32px);
  margin:0;letter-spacing:.02em;text-transform:uppercase;
  color:var(--cink);
}
.c-title em{color:var(--cred);font-style:normal}
.c-steps{display:flex;gap:0;align-items:center;font-family:'Bowlby One';font-size:12px;letter-spacing:.08em;flex-wrap:wrap;gap:8px}
.c-step{
  display:flex;align-items:center;gap:8px;
  padding:7px 12px;
  background:#fff;border:2px solid #111;box-shadow:3px 3px 0 #111;
}
.c-step-num{
  width:20px;height:20px;border-radius:50%;background:#111;color:#fff;
  display:grid;place-items:center;font-size:11px;flex-shrink:0;
}
.c-step--active{background:var(--cred);color:#fff}
.c-step--active .c-step-num{background:#fff;color:var(--cred)}
.c-step--done{background:#0c0c0c;color:#fff}
.c-step--done .c-step-num{background:#fff;color:#0c0c0c}

/* ============ PAGE LAYOUT ============ */
.c-page{
  max-width:1240px;margin:0 auto;
  padding:22px 20px 80px;
  display:grid;
  grid-template-columns:minmax(0,1.6fr) minmax(0,1fr);
  gap:32px;align-items:flex-start;
}
@media(max-width:1000px){.c-page{grid-template-columns:1fr;gap:24px}}

/* ============ TIER STRIP ============ */
.tier{
  display:grid;
  grid-template-columns:auto 1fr auto;
  gap:18px;align-items:stretch;
  padding:14px 16px;
  background:#0c0c0c;color:#fff;
  border:3px solid #0c0c0c;box-shadow:var(--cshadow);
  margin:22px 20px 0;
  max-width:1240px;
  position:relative;overflow:hidden;
}
.tier::before{
  content:"";position:absolute;inset:0;pointer-events:none;
  background-image:repeating-linear-gradient(45deg,transparent 0 18px,rgba(255,255,255,.04) 18px 19px);
}
.tier-silver{background:linear-gradient(90deg,#0c0c0c 60%,#1a1a1a)}
.tier-gold{background:linear-gradient(90deg,#0c0c0c 50%,#1c0908)}
.tier-gold::after,.tier-silver::after,.tier-bronze::after{
  content:"";position:absolute;left:0;top:0;bottom:0;width:6px;
}
.tier-gold::after{background:var(--cred)}
.tier-silver::after{background:#fff}
.tier-bronze::after{background:#a86b3c}
.tier-medal{
  display:flex;align-items:center;justify-content:center;
  background:#fff;border:2px solid #fff;
  width:76px;height:76px;position:relative;z-index:1;
}
.tier-info{position:relative;z-index:1;display:flex;flex-direction:column;justify-content:center;gap:6px;min-width:0}
.tier-label{font-family:'Bowlby One';font-size:11px;letter-spacing:.14em;color:rgba(255,255,255,.6);text-transform:uppercase}
.tier-name{font-size:20px;color:#fff;margin-left:8px;letter-spacing:.04em}
.tier-gold .tier-name{color:var(--cred);text-shadow:1px 1px 0 #fff}
.tier-perks{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:3px;font-size:13px;font-weight:500;color:rgba(255,255,255,.92)}
.tier-perks li{display:flex;align-items:center;gap:8px;line-height:1.25}
.tier-perks .dot{width:7px;height:7px;background:var(--cred);display:inline-block;flex-shrink:0}
.tier-bar-wrap{margin-top:10px;display:flex;flex-direction:column;gap:6px}
.tier-bar{position:relative;height:10px;background:rgba(255,255,255,.10);border:2px solid #fff}
.tier-bar-fill{position:absolute;top:0;left:0;bottom:0;background:var(--cred);transition:width .5s cubic-bezier(.2,.8,.2,1)}
.tier-stop{position:absolute;top:50%;transform:translate(-50%,-50%);z-index:1}
.tier-stop-b{left:0%}
.tier-stop-g{left:100%}
.stop-dot{display:grid;place-items:center;width:22px;height:22px;border-radius:50%;background:#0c0c0c;border:2px solid #fff;color:#fff;font-family:'Bowlby One';font-size:11px;line-height:1}
.tier-stop.reached .stop-dot{background:var(--cred);color:#fff;border-color:#fff}
.tier-stop-g.reached .stop-dot{background:#fff;color:var(--cred)}
.tier-bar-cap{font-size:10.5px;font-weight:600;letter-spacing:.08em;color:rgba(255,255,255,.65);text-transform:uppercase}
.tier-bar-cap b{color:#fff}
.tier-status{
  position:relative;z-index:1;
  display:flex;flex-direction:column;align-items:flex-end;gap:8px;
  min-width:180px;text-align:right;
  border-left:2px dashed rgba(255,255,255,.18);padding-left:18px;
}
.tier-pct{font-family:'Bowlby One';font-size:34px;color:var(--cred);line-height:.9;text-shadow:2px 2px 0 #fff}
.tier-upsell{font-family:'Bowlby One';font-size:14px;line-height:1.1;color:#fff}
.tier-upsell b{color:var(--cred);font-size:18px;display:block}
.tier-pct-lab{font-size:10.5px;font-weight:600;letter-spacing:.06em;color:rgba(255,255,255,.7);text-transform:uppercase;line-height:1.25}
.tier-progress{width:100%;display:flex;flex-direction:column;gap:6px;margin-top:4px}
.tier-prog-item{display:flex;flex-direction:column;gap:3px;text-align:left}
.tier-prog-top{display:flex;justify-content:space-between;align-items:baseline;font-size:10.5px;font-weight:600;letter-spacing:.04em;color:rgba(255,255,255,.85);text-transform:uppercase}
.tier-prog-top b{color:#fff;font-size:11px;font-family:'Bowlby One';letter-spacing:.06em}
.tier-prog-bar{height:6px;background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.3);position:relative;overflow:hidden}
.tier-prog-fill{position:absolute;inset:0;background:var(--cred);transition:width .4s ease}
@media(max-width:760px){
  .tier{grid-template-columns:auto 1fr;gap:12px}
  .tier-status{grid-column:1/-1;align-items:flex-start;text-align:left;border-left:none;border-top:2px dashed rgba(255,255,255,.18);padding-left:0;padding-top:10px;min-width:0}
}

/* ============ PANEL (manga card) ============ */
.c-panel{
  background:var(--cpaper);
  border:3px solid #111;
  box-shadow:var(--cshadow);
  position:relative;
}
.c-panel-head{
  display:flex;align-items:center;gap:12px;
  padding:14px 18px;
  border-bottom:3px solid #0c0c0c;
  background:#0c0c0c;color:#fff;
  font-family:'Bowlby One',sans-serif;letter-spacing:.06em;text-transform:uppercase;
  position:relative;
  background-image:radial-gradient(circle at 1px 1px,rgba(255,255,255,.10) 1px,transparent 1.4px);
  background-size:8px 8px;
}
.c-tag{background:#fff;color:#0c0c0c;padding:2px 8px;font-size:11px;border:2px solid #fff;font-family:'Bowlby One'}
.c-grow{flex:1}
.c-cnt{background:var(--cred);color:#fff;padding:2px 10px;font-size:13px;border:2px solid #fff;font-family:'Bowlby One'}
.c-halftone{
  position:absolute;width:120px;height:120px;
  background-image:radial-gradient(circle,#111 1.6px,transparent 1.8px);
  background-size:10px 10px;opacity:.22;pointer-events:none;
}
.c-ht-tl{top:-6px;left:-6px;mask-image:linear-gradient(135deg,#000,transparent 70%)}
.c-ht-br{bottom:-6px;right:-6px;mask-image:linear-gradient(315deg,#000,transparent 70%)}

/* ============ PRODUCT ROW ============ */
.c-product{
  display:grid;
  grid-template-columns:88px 1fr auto auto;
  align-items:center;gap:16px;
  padding:16px;
  border-bottom:2px dashed #0c0c0c;
  position:relative;
}
.c-product:last-of-type{border-bottom:none}
.c-cover{
  width:88px;height:124px;
  border:3px solid #0c0c0c;box-shadow:3px 3px 0 #0c0c0c;
  background:#222;position:relative;overflow:hidden;flex-shrink:0;
}
.cart-cover-img{width:100%;height:100%;object-fit:cover;display:block}
.cart-cover-placeholder{
  width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  font-family:'Bowlby One';font-size:28px;color:#555;background:#1a1a1a;
}
.p-info{min-width:0}
.p-title{font-family:'Bowlby One',sans-serif;font-size:17px;line-height:1.15;margin:0 0 5px;text-transform:uppercase;letter-spacing:.01em;color:var(--cink)}
.p-meta{font-size:12px;color:var(--cmuted);margin:0}
.c-qty{
  display:inline-flex;align-items:center;
  border:2px solid #111;background:#fff;box-shadow:3px 3px 0 #111;
}
.c-qty button{width:32px;height:32px;border:none;background:transparent;font-size:17px;font-weight:800;cursor:pointer;font-family:'Bowlby One'}
.c-qty button:hover{background:#111;color:#fff}
.c-qty button:disabled{opacity:.35;cursor:not-allowed}
.c-qty .v{min-width:34px;text-align:center;font-weight:700;font-size:14px;border-left:2px solid #111;border-right:2px solid #111;height:32px;line-height:32px}
.c-price{font-family:'Bowlby One',sans-serif;font-size:19px;color:var(--cred);text-align:right;min-width:72px}
.c-kill{
  position:absolute;top:8px;right:8px;
  width:24px;height:24px;border-radius:50%;
  background:#fff;border:2px solid #111;display:grid;place-items:center;
  cursor:pointer;font-weight:800;font-size:15px;
}
.c-kill:hover{background:var(--cred);color:#fff}
@media(max-width:640px){
  .c-product{grid-template-columns:72px 1fr}
  .c-cover{width:72px;height:100px}
  .c-qty,.c-price{grid-column:2}
  .c-price{text-align:left}
}

/* ============ SUMMARY PANEL ============ */
.c-summary{position:relative}
.c-burst{
  position:absolute;top:-26px;right:-22px;
  width:90px;height:90px;background:var(--cred);
  display:grid;place-items:center;
  color:#fff;font-family:'Bowlby One';font-size:12px;line-height:1.1;text-align:center;letter-spacing:.04em;text-transform:uppercase;
  border-radius:50%;transform:rotate(-8deg);
  box-shadow:0 0 0 3px #0c0c0c,0 0 0 6px #fff,0 0 0 8px #0c0c0c;
  z-index:2;padding:6px;
}
.burst-small{font-size:9px;display:block;opacity:.9;letter-spacing:.06em;margin-top:2px}
.burst-silver{background:#fff;color:#0c0c0c;box-shadow:0 0 0 3px #0c0c0c,0 0 0 6px var(--cred),0 0 0 8px #0c0c0c}
.burst-gold{background:#0c0c0c;color:var(--cred);box-shadow:0 0 0 3px var(--cred),0 0 0 6px #fff,0 0 0 8px #0c0c0c}
.burst-bronze{background:#a86b3c}

.c-sum-body{padding:18px;background:#fff}
.sum-row{display:flex;justify-content:space-between;align-items:baseline;padding:8px 0;font-size:14px}
.sum-row.muted{color:var(--cmuted)}
.sum-row strong{font-weight:700}
.c-discount{color:var(--cred)}
.c-hr{border:none;border-top:2px dashed var(--cred);margin:10px 0;opacity:.5}

.c-ship-bar{
  margin:10px 0 2px;background:#0c0c0c;color:#fff;border:2px solid #0c0c0c;padding:10px 12px;
  display:flex;flex-direction:column;gap:8px;
}
.ship-top{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;letter-spacing:.02em}
.ship-truck{width:20px;height:12px;background:var(--cred);border:2px solid #fff;flex-shrink:0}
.ship-track{height:8px;background:#222;border:2px solid #fff;position:relative;overflow:hidden}
.ship-fill{position:absolute;inset:0;background:var(--cred);transition:width .4s ease}

.c-total-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 18px;background:var(--cred);color:#fff;
  border-top:3px solid #0c0c0c;border-bottom:3px solid #0c0c0c;
  position:relative;
  background-image:repeating-linear-gradient(135deg,transparent 0 12px,rgba(0,0,0,.08) 12px 14px);
}
.c-total-row::before{content:"";position:absolute;left:-3px;top:-3px;bottom:-3px;width:6px;background:#0c0c0c}
.c-total-lab{font-family:'Bowlby One';font-size:15px;letter-spacing:.06em}
.c-total-lab small{display:block;font-size:10px;opacity:.8;font-weight:400;letter-spacing:.08em;margin-top:2px}
.c-total-val{font-family:'Bowlby One';font-size:28px;color:#fff;text-shadow:2px 2px 0 #0c0c0c}

/* ============ PROMO ============ */
.c-promo{padding:16px 18px;background:#fff;border-bottom:3px solid #0c0c0c}
.promo-label{font-family:'Bowlby One';font-size:12px;text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:8px}
.promo-row{display:flex;gap:0}
.promo-input{
  flex:1;background:#fff;border:2px solid #111;padding:10px 12px;
  font-size:14px;font-family:inherit;outline:none;border-right:none;
}
.promo-input:focus{background:#fff7d6}
.promo-apply{
  background:#111;color:#fff;border:2px solid #111;padding:0 16px;
  font-family:'Bowlby One';letter-spacing:.06em;cursor:pointer;font-size:13px;
}
.promo-apply:hover{background:var(--cred);border-color:var(--cred)}
.promo-msg{font-size:12px;font-weight:600;margin-top:8px}
.promo-msg.err{color:var(--cred)}
.promo-applied{
  display:flex;align-items:center;gap:8px;background:#dff6ea;border:2px solid var(--cgreen);
  padding:8px 10px;font-size:13px;font-weight:600;color:#0c5b3e;
}
.promo-x{margin-left:auto;cursor:pointer;font-weight:800;font-size:16px}

/* ============ CTA ZONE ============ */
.c-cta-zone{padding:18px;background:var(--cpaper2)}
.c-sfx{
  font-family:'Bangers',sans-serif;font-size:38px;color:var(--cred);
  -webkit-text-stroke:2px #0c0c0c;letter-spacing:.04em;
  transform:rotate(-12deg);text-shadow:3px 3px 0 #0c0c0c;
  display:inline-block;margin-bottom:4px;
}
.c-terms{display:flex;gap:10px;align-items:flex-start;font-size:13px;line-height:1.4;margin-bottom:14px}
.c-check{
  appearance:none;-webkit-appearance:none;
  width:20px;height:20px;border:2px solid #111;background:#fff;cursor:pointer;
  display:grid;place-items:center;flex-shrink:0;margin-top:1px;
}
.c-check:checked{background:var(--cred)}
.c-check:checked::after{content:"✓";color:#fff;font-weight:800;font-size:13px;line-height:1}
.c-terms a{color:#111;font-weight:700;text-decoration:underline;text-decoration-thickness:2px;text-underline-offset:3px}
.c-terms a:hover{color:var(--cred)}
.c-error{color:var(--cred);font-size:13px;font-weight:600;padding:8px 10px;background:#ffe5e5;border:2px solid var(--cred);margin-bottom:10px}
.c-cta-btn{
  display:flex;width:100%;padding:15px 18px;
  background:var(--cred);color:#fff;border:3px solid #0c0c0c;
  font-family:'Bowlby One',sans-serif;font-size:16px;
  text-transform:uppercase;letter-spacing:.05em;
  cursor:pointer;box-shadow:5px 5px 0 #0c0c0c;
  align-items:center;justify-content:flex-start;gap:12px;
  transition:transform .12s,box-shadow .12s;
}
.c-cta-btn:hover{transform:translate(-2px,-2px);box-shadow:7px 7px 0 #111}
.c-cta-btn:active{transform:translate(2px,2px);box-shadow:2px 2px 0 #111}
.c-cta-btn:disabled{background:#bbb;cursor:not-allowed;box-shadow:5px 5px 0 #555;border-color:#555}
.c-cta-btn:disabled:hover{transform:none;box-shadow:5px 5px 0 #555}
.c-lock{width:22px;height:22px;background:#fff;color:var(--cred);border-radius:50%;display:grid;place-items:center;font-size:12px;flex-shrink:0}
.c-secure{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:14px;font-size:12px;color:var(--cmuted);font-weight:500;flex-wrap:wrap}
.c-pills{display:flex;gap:6px;flex-wrap:wrap}
.c-pill{background:#fff;border:2px solid #111;padding:3px 8px;font-family:'Bowlby One';font-size:10px;letter-spacing:.04em}

/* ============ TRUST BAR ============ */
.c-trust{
  margin-top:20px;
  display:grid;grid-template-columns:repeat(3,1fr);gap:0;
  border:3px solid #111;background:var(--cpaper);box-shadow:var(--cshadow);
}
.c-trust>div{padding:12px;display:flex;align-items:center;gap:10px;font-size:12px;font-weight:600;line-height:1.2}
.c-trust>div+div{border-left:2px dashed #0c0c0c}
.c-ico{width:34px;height:34px;background:#0c0c0c;color:#fff;border:2px solid #0c0c0c;display:grid;place-items:center;font-size:16px;flex-shrink:0}
.c-ico--red{background:var(--cred);color:#fff;border-color:var(--cred)}
.c-ico--white{background:#fff;color:#0c0c0c;border-color:#0c0c0c}
.c-muted{color:var(--cmuted);font-weight:500}
@media(max-width:480px){.c-trust{grid-template-columns:1fr}.c-trust>div+div{border-left:none;border-top:2px dashed #0c0c0c}}

/* ============ EMPTY ============ */
.cart-empty{
  text-align:center;padding:60px 20px;max-width:400px;margin:0 auto;
  font-family:'Space Grotesk',sans-serif;
}
.cart-empty-icon{font-size:52px;display:block;margin-bottom:16px}
.cart-empty p{font-size:16px;color:var(--cmuted);margin:0 0 20px}
.cart-empty a{
  display:inline-block;padding:12px 24px;
  background:var(--cred);color:#fff;border:3px solid #0c0c0c;
  font-family:'Bowlby One';font-size:14px;text-decoration:none;letter-spacing:.06em;
  box-shadow:4px 4px 0 #0c0c0c;transition:transform .12s,box-shadow .12s;
}
.cart-empty a:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 #111}

/* ============ OVERRIDE: cart-page heading ============ */
.cart-page h1,.cart-page .cart-subtitle{display:none}

/* ============ PRODOTTI CONSIGLIATI ============ */
.c-also{margin-top:24px}
.c-also-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.c-also-head h3{font-family:'Bowlby One',sans-serif;text-transform:uppercase;font-size:20px;margin:0;letter-spacing:.02em;color:var(--cink)}
.c-also-head .swish{color:var(--cred)}
.c-also-head span{font-size:12px;color:var(--cmuted);font-weight:600;letter-spacing:.06em}
.c-also-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
@media(max-width:900px){.c-also-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:400px){.c-also-grid{grid-template-columns:repeat(2,1fr);gap:8px}}
.c-mini{
  background:var(--cpaper);border:3px solid #111;box-shadow:4px 4px 0 #111;
  padding:10px;display:flex;flex-direction:column;gap:8px;cursor:pointer;
  transition:transform .15s,box-shadow .15s;
}
.c-mini:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 #111}
.c-mini-cover{
  aspect-ratio:3/4;border:2px solid #111;position:relative;overflow:hidden;background:#1a1a1a;
}
.c-mini-cover img{width:100%;height:100%;object-fit:cover;display:block}
.c-mini-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-family:'Bowlby One';font-size:24px;color:#555}
.c-mini-ribbon{
  position:absolute;top:8px;left:-2px;background:var(--cred);color:#fff;
  font-family:'Bowlby One';font-size:10px;padding:2px 8px;letter-spacing:.06em;
}
.c-mini h4{font-family:'Bowlby One';margin:0;font-size:13px;line-height:1.15;text-transform:uppercase;color:var(--cink)}
